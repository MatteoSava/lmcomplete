name: CD

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Install Rust toolchain
        run: rustup toolchain install --profile minimal --component rustfmt,clippy

      - name: Resolve package version
        id: version
        run: echo "value=$(bash .github/scripts/verify-version.sh "${GITHUB_REF_NAME}")" >> "$GITHUB_OUTPUT"

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-targets --all-features

      - name: Verify publish package
        run: cargo publish --dry-run

      - name: Extract release notes
        run: bash .github/scripts/extract-changelog.sh "${{ steps.version.outputs.value }}" > release-notes.md

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
